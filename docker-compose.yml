services:
  collectarr:
    build: .
    ports:
      - "8893:8090"
    volumes:
      - ./data:/data
      - /path/to/media:/media
      - /path/to/hardlink_destination:/hardlink_destination
      - ./frontend/build:/app/frontend/build:ro
    environment:
      - MEDIA_PATH=/media
      - DB_PATH=/data/collectarr.db
      - PORT=8090
      - AUTO_SCAN=true
